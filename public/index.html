<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Flow — Workflows</title>
  <link rel="stylesheet" href="/css/home.css">
  <script>(function(){if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light');})()</script>
</head>
<body>

  <header class="home-header">
    <a href="/" class="home-logo">CRM Flow</a>
    <div class="home-header-right">
      <button class="home-theme-btn" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">
        <svg id="themeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <a href="/builder" class="home-new-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round">
          <line x1="7" y1="1" x2="7" y2="13"/>
          <line x1="1" y1="7" x2="13" y2="7"/>
        </svg>
        New Workflow
      </a>
    </div>
  </header>

  <main class="home-main">
    <div class="home-page-header">
      <h1 class="home-title">Workflows</h1>
      <span class="home-subtitle" id="workflowCount"></span>
    </div>

    <div id="workflowGrid" class="wf-grid"></div>

    <div id="emptyState" class="wf-empty" style="display:none">
      <div class="wf-empty-icon">⚡</div>
      <div class="wf-empty-title">No workflows yet</div>
      <div class="wf-empty-desc">
        Create your first workflow to automate your CRM processes.
      </div>
      <a href="/builder" class="home-new-btn">Create Workflow</a>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="/js/ThemeManager.js"></script>
  <script src="/js/HomePage.js"></script>
</body>
</html>
