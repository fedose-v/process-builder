<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Process Builder</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">CRM Flow</div>
    <input class="process-name" value="New Lead Onboarding" />
    <span style="font-size:11px;color:#64748b;">Draft</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="clearCanvas()">Clear</button>
    <button class="btn btn-ghost" onclick="loadExample()">Load Example</button>
    <button class="btn btn-primary" onclick="validateFlow()">Validate</button>
    <button class="btn btn-success" onclick="activateFlow()">Activate</button>
  </div>
</div>

<div class="workspace">

  <!-- LEFT PANEL -->
  <div class="panel-left" id="panelLeft">
    <div class="panel-content" id="panelContent">

      <!-- Category view -->
      <div id="viewCategories">
        <div class="panel-lib-header">Node Library</div>
        <div class="panel-section" id="categoryList"></div>
      </div>

      <!-- Item view (hidden until category selected) -->
      <div id="viewItems" style="display:none">
        <div class="panel-back" onclick="showCategories()">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="flex-shrink:0">
            <path d="M8 2L4 6L8 10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span id="panelCategoryTitle">Triggers</span>
        </div>
        <div class="panel-search-wrap">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" style="position:absolute;left:20px;top:50%;transform:translateY(-50%);pointer-events:none;color:#64748b">
            <circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.4"/>
            <line x1="8.7" y1="8.7" x2="12" y2="12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <input class="panel-search" id="panelSearch" placeholder="Search nodes…" oninput="filterItems(this.value)" />
        </div>
        <div class="panel-section" id="itemList"></div>
      </div>

    </div>
    <button class="panel-toggle" id="panelToggle" onclick="togglePanel()" title="Toggle panel">
      <svg id="panelToggleIcon" width="10" height="10" viewBox="0 0 10 16" fill="none">
        <path d="M7 2L2 8L7 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <!-- CANVAS -->
  <div class="canvas-wrap" id="canvasWrap"
    ondragover="event.preventDefault()"
    ondrop="onDrop(event)"
    onmousedown="onCanvasMouseDown(event)"
    onmousemove="onCanvasMouseMove(event)"
    onmouseup="onCanvasMouseUp(event)">
    <div class="canvas-bg"></div>

    <div class="toolbar">
      <button class="tool-btn active" id="tool-select" onclick="setTool('select')">
        <span>↖</span> Select
      </button>
      <button class="tool-btn" id="tool-connect" onclick="setTool('connect')">
        <span>↗</span> Connect
      </button>
      <button class="tool-btn" onclick="autoLayout()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="display:inline-block;vertical-align:middle;flex-shrink:0">
          <rect x="5" y="0" width="4" height="3.5" rx="0.8" fill="currentColor"/>
          <rect x="0" y="10.5" width="4" height="3.5" rx="0.8" fill="currentColor"/>
          <rect x="10" y="10.5" width="4" height="3.5" rx="0.8" fill="currentColor"/>
          <line x1="7" y1="3.5" x2="7" y2="7" stroke="currentColor" stroke-width="1.2"/>
          <line x1="2" y1="7" x2="12" y2="7" stroke="currentColor" stroke-width="1.2"/>
          <line x1="2" y1="7" x2="2" y2="10.5" stroke="currentColor" stroke-width="1.2"/>
          <line x1="12" y1="7" x2="12" y2="10.5" stroke="currentColor" stroke-width="1.2"/>
        </svg>
        Auto Layout
      </button>
    </div>

    <svg id="svg-layer">
      <defs>
        <marker id="arrow" markerWidth="12" markerHeight="10" refX="12" refY="5" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M 0 0 L 12 5 L 0 10 Z" style="fill:#7c6aff" />
        </marker>
        <marker id="arrow-yes" markerWidth="12" markerHeight="10" refX="12" refY="5" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M 0 0 L 12 5 L 0 10 Z" style="fill:#22c55e" />
        </marker>
        <marker id="arrow-no" markerWidth="12" markerHeight="10" refX="12" refY="5" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M 0 0 L 12 5 L 0 10 Z" style="fill:#ef4444" />
        </marker>
      </defs>
    </svg>

    <div id="canvas"></div>

    <div class="canvas-hint" id="canvasHint">
      <div class="canvas-hint-icon">⬅️</div>
      <div class="canvas-hint-text">Drag nodes from the left panel<br>to start building your process</div>
    </div>

    <div class="canvas-controls">
      <button class="canvas-btn" onclick="zoom(-0.1)">−</button>
      <div class="zoom-label" id="zoomLabel">100%</div>
      <button class="canvas-btn" onclick="zoom(0.1)">+</button>
      <button class="canvas-btn" onclick="resetView()" title="Reset view">⊙</button>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel-right" id="panelRight">
    <div class="panel-right-header">
      <div class="panel-right-title" id="propTitle">Properties</div>
      <div class="panel-right-sub" id="propSub">Select a node to configure</div>
    </div>
    <div class="panel-right-body" id="propBody">
      <div class="empty-panel">
        Click on any node to view and edit its properties here.
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="/js/state.js"></script>
<script src="/js/nodes.js"></script>
<script src="/js/connections.js"></script>
<script src="/js/canvas.js"></script>
<script src="/js/properties.js"></script>
<script src="/js/panel.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
